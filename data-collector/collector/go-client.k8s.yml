apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-client
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app: go-client
  template:
    metadata:
      labels:
        app: go-client
    spec:
      serviceAccountName: data-collector
      containers:
        - name: go-client
          imagePullPolicy: IfNotPresent
          image: go-client
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          volumeMounts:
            - mountPath: /sqlite-data
              name: sqlite-storage
          env:
            - name: PYTHON_URL
              valueFrom:
                configMapKeyRef:
                  key: python-config
                  name: python-url
          ports:
            - containerPort: 1323

      volumes:
        - name: sqlite-storage
          emptyDir: {}
          # hostPath:
          #   path: /data/sqlite
