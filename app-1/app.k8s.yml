apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app-1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-app-1
  template:
    metadata:
      labels:
        app: my-app-1
    spec:
      containers:
        - name: my-app-1
          image: self-healing-app-1:v1
          resources:
            requests:
              memory: "100Mi"
              cpu: "300m"
            limits:
              memory: "200Mi"
              cpu: "500m"
          ports:
            - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: my-app-1
spec:
  type: LoadBalancer
  selector:
    app: my-app-1
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      nodePort: 31000
